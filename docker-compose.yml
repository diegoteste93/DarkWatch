services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: darkwatch
      POSTGRES_USER: darkwatch
      POSTGRES_PASSWORD: darkwatch
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://darkwatch:darkwatch@postgres:5432/darkwatch
      PYTHONPATH: /app
    ports:
      - "9003:9003"
    command: bash -c "python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 9003"

volumes:
  pgdata:
